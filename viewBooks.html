<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Collection — BookNest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">📚 <span>BookNest</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="addBook.html">Add Book</a></li>
        <li><a href="viewBooks.html">View Books</a></li>
      </ul>
      <div class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div class="page-header-text">
        <div class="page-eyebrow">The Collection</div>
        <h1>Library Catalogue</h1>
      </div>
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            placeholder="Search title, author, ISBN…"
          />
        </div>
        <a href="addBook.html" class="btn btn-primary">+ Add Book</a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="booksTableBody">
          <!-- Populated by script.js -->
        </tbody>
      </table>

      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-icon">📭</div>
        <p>No books found. Try a different search or <a href="addBook.html" style="color:var(--amber);">add a new one</a>.</p>
      </div>

      <div class="table-footer">
        <span>Showing <span class="count-badge" id="bookCount">—</span> books</span>
        <span id="lastUpdated" style="color:rgba(26,22,18,0.35);"></span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
