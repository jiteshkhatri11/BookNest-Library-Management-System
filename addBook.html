<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Book — BookNest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">📚 <span>BookNest</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="addBook.html">Add Book</a></li>
        <li><a href="viewBooks.html">View Books</a></li>
      </ul>
      <div class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <div class="form-page">
    <div class="form-card" style="max-width:520px;">
      <div class="form-eyebrow">Catalogue</div>
      <h1 class="form-title">Add a New Book</h1>
      <p class="form-subtitle">Register a new title in the library collection.</p>

      <form id="addBookForm" novalidate>
        <div class="form-group">
          <label for="title">Book Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="e.g. The Name of the Rose"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="author">Author</label>
          <input
            type="text"
            id="author"
            name="author"
            placeholder="e.g. Umberto Eco"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="isbn">ISBN</label>
          <input
            type="text"
            id="isbn"
            name="isbn"
            placeholder="e.g. 978-0-15-144647-6"
            autocomplete="off"
            maxlength="20"
          />
          <div id="isbnHint" style="font-size:0.75rem;margin-top:0.375rem;color:rgba(26,22,18,0.35);transition:color 0.2s;">
            International Standard Book Number — 10 or 13 digits
          </div>
        </div>

        <div style="margin-top:0.25rem;">
          <button type="submit" class="btn btn-primary btn-full btn-lg">Add to Library</button>
        </div>
      </form>

      <div id="addedPreview"></div>

      <div class="form-footer" style="margin-top:1.5rem;">
        Want to see all books? <a href="viewBooks.html">View Collection →</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
